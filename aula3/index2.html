<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /*Colors*/
        .c1{ background-color: #87B6BC;}
        .c2{ background-color: #BED4CB;}
        .c3{ background-color: #F6F09F;}
        .c4{ background-color: #B35656;}
        .c5{ background-color: #FFD786;}
        .c6{ background-color: #FFAA00;}
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 3rem 5rem 5rem;
            gap: 10px;
        }
        .header{
            grid-column-start: 1;
            grid-column-end: 4;
        }
        .menu{
            grid-column: 1 / 2;
            grid-row: 2 / 4;
        }
        .content {
            grid-column: 2 / 4;
            grid-row: 2 / 3;
        }
        .ads {
            grid-column: 2 / 3;
            grid-row: 3 / 4;
        }
        .cc {
            grid-column: 3 / 4;
            grid-row: 3 / 4;
        }
        .item {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
            color: black;
            font-weight: bold;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item c1 header">header</div>
        <div class="item c2 menu">menu</div>
        <div class="item c3 content">content</div>
        <div class="item c4 ads">ads</div>
        <div class="item c5 cc">cc</div>
    </div>
</body>
</html>
