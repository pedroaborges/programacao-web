<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            box-sizing: border-box;
        }

        .container {
            width: 100wv;
            background-color: cornflowerblue;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-end;
            gap: 2rem;
            height: 3rem;
            padding: 20px;
            color: white;
            font-family: sans-serif;
        }

        .item:hover {
            background-color: deepskyblue;
            padding: 0.5rem;
            border-radius: 5px;
        }
        .grid{
            margin-top: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 10em);
            gap: 0.5rem;
        }
        .latinha {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }
        /*Colors*/
        .c1{ background-color: #87B6BC;}
        .c2{ background-color: #BED4CB;}
        .c3{ background-color: #F6F09F;}
        .c4{ background-color: #B35656;}
        .c5{ background-color: #FFD786;}
        .c6{ background-color: #FFAA00;}
    </style>
</head>

<body>
    <div class="container">
        <div class="item">Home</div>
        <div class="item">About</div>
        <div class="item">Services</div>
        <div class="item">Contact</div>
        <div class="item">Feedback</div>
    </div>
    <div class="grid">
        <div class="latinha c1"><img src="https://picsum.photos/150" alt="" srcset=""></div>
        <div class="latinha c2"><img src="https://picsum.photos/150" alt="" srcset=""></div>
        <div class="latinha c3"><img src="https://picsum.photos/150" alt="" srcset=""></div>
        <div class="latinha c4"><img src="https://picsum.photos/150" alt="" srcset=""></div>
        <div class="latinha c5"><img src="https://picsum.photos/150" alt="" srcset=""></div>
        <div class="latinha c6"><img src="https://picsum.photos/150" alt="" srcset=""></div>
    </div>
</body>

</html>
