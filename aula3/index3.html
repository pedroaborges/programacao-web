<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid; /*6x6*/
            grid-template-areas: 
            "header header header header header ads"
            "nav article article article article article "
            "nav article article article article article "
            "nav article article article article article "
            "nav article article article article article "
            "nav footer footer footer footer footer ";

        }
        .item {
            background-color: darkolivegreen;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item header">header</div>
        <div class="item ads">ads</div>
        <div class="item nav">nav</div>
        <div class="item article">article</div>
        <div class="item footer">footer</div>
    </div>
</body>
</html>
