<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: grid; /*6x6*/
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 3rem);
            grid-template-areas: 
            "header header header header header ads"
            "nav article article article article article"
            "nav article article article article article"
            "nav article article article article article"
            "nav article article article article article"
            "nav footer footer footer footer footer";
            gap: 10px;
        }
        .header {
            grid-area: header;
        }
        .ads {
            grid-area: ads;
        }
        .nav {
            grid-area: nav;
        }
        .article {
            grid-area: article;
        }
        .footer {
            grid-area: footer;
        }
        .item {
            background-color: darkolivegreen;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item header">header</div>
        <div class="item ads">ads</div>
        <div class="item nav">nav</div>
        <div class="item article">article</div>
        <div class="item footer">footer</div>
    </div>
</body>
</html>
